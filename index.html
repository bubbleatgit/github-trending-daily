<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 热门仓库趋势 | Daily Trending</title>
    <link rel="icon" href="https://github.githubassets.com/favicons/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .ai-gradient-border {
            position: relative;
            background: white;
            border-radius: 1rem;
            z-index: 0;
        }
        .ai-gradient-border::before {
            content: '';
            position: absolute;
            inset: -2px;
            z-index: -1;
            border-radius: 1rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .card-glow:hover {
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.4);
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
    <header class="bg-gradient-to-r from-indigo-500 to-purple-600 text-white py-12 px-4 relative overflow-hidden">
        <div class="absolute inset-0 bg-black/10"></div>
        <div class="max-w-6xl mx-auto text-center relative z-10">
            <h1 class="text-4xl md:text-6xl font-bold mb-4">🔥 GitHub 热门仓库趋势</h1>
            <p class="text-xl opacity-95 mb-6">每日自动更新，追踪开源社区热点</p>
            <p class="text-sm opacity-90">最后更新：<span id="updateDate" class="font-semibold bg-white/20 px-3 py-1 rounded-full">-</span></p>
        </div>
        <div class="absolute top-6 right-4 z-20">
            <a href="https://github.com/bubbleatgit/github-trending-daily" target="_blank"
               class="inline-flex items-center gap-2 bg-white/25 backdrop-blur-sm hover:bg-white/35 px-4 py-2 rounded-full transition-all border border-white/30">
                <img src="https://github.githubassets.com/favicons/favicon.svg" alt="GitHub" width="20">
                查看源码
            </a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- 类型与日期选择 -->
        <section class="ai-gradient-border p-6 mb-8 bg-white">
            <h3 class="text-lg font-semibold mb-4 text-gray-800">📅 榜单选择</h3>
            <div class="flex flex-wrap gap-3 mb-4">
                <button class="type-btn active px-6 py-2 border-2 rounded-full transition-all hover:border-indigo-600 data-[active=true]:bg-gradient-to-r data-[active=true]:from-indigo-500 data-[active=true]:to-purple-600 data-[active=true]:text-white data-[active=true]:border-transparent border-gray-200 bg-white text-gray-700 card-glow" data-type="daily">📆 日榜单</button>
                <button class="type-btn px-6 py-2 border-2 rounded-full transition-all hover:border-indigo-600 data-[active=true]:bg-gradient-to-r data-[active=true]:from-indigo-500 data-[active=true]:to-purple-600 data-[active=true]:text-white data-[active=true]:border-transparent border-gray-200 bg-white text-gray-700 card-glow" data-type="weekly">📅 周榜单</button>
            </div>
            <div>
                <select id="dateSelector" class="date-selector border-2 border-gray-200 rounded-lg px-4 py-2 text-base bg-white focus:outline-none focus:border-indigo-500 min-w-[240px] focus:ring-2 focus:ring-indigo-200">
                    <option value="">加载中...</option>
                </select>
            </div>
        </section>

        <!-- 统计信息 -->
        <section class="ai-gradient-border p-6 mb-8 bg-white">
            <div class="stat-card">
                <h3 class="text-lg font-semibold mb-4 text-gray-800">📊 统计信息</h3>
                <div id="statsSummary" class="grid grid-cols-2 md:grid-cols-4 gap-4">加载中...</div>
            </div>
        </section>

        <!-- 语言筛选 -->
        <section class="ai-gradient-border p-6 mb-8 bg-white">
            <h3 class="text-lg font-semibold mb-4 text-gray-800">🔍 语言筛选</h3>
            <div class="flex flex-wrap gap-2" id="languageFilters">
                <button class="filter-btn active px-4 py-2 border-2 rounded-full transition-all hover:border-indigo-500 data-[active=true]:bg-gradient-to-r data-[active=true]:from-indigo-500 data-[active=true]:to-purple-600 data-[active=true]:text-white data-[active=true]:border-transparent border-gray-200 bg-white text-gray-700 card-glow" data-lang="all">全部</button>
            </div>
        </section>

        <!-- 榜单表格 -->
        <section class="ai-gradient-border p-6 mb-8 bg-white">
            <h2 class="text-2xl font-semibold mb-6 pb-3 border-b-2 border-gray-200 text-gray-800">📈 热门仓库排行榜</h2>
            <div class="overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-gradient-to-r from-gray-50 to-gray-100">
                            <th class="px-3 py-4 text-left font-semibold border-b-2 border-gray-200">排名</th>
                            <th class="px-3 py-4 text-left font-semibold border-b-2 border-gray-200">仓库</th>
                            <th class="px-3 py-4 text-left font-semibold border-b-2 border-gray-200">语言</th>
                            <th class="px-3 py-4 text-left font-semibold border-b-2 border-gray-200">Stars</th>
                            <th class="px-3 py-4 text-left font-semibold border-b-2 border-gray-200">Forks</th>
                            <th class="px-3 py-4 text-left font-semibold border-b-2 border-gray-200">新增</th>
                            <th class="px-3 py-4 text-left font-semibold border-b-2 border-gray-200">简介</th>
                        </tr>
                    </thead>
                    <tbody id="trendingBody">
                        <tr><td colspan="7" class="px-3 py-6 text-center text-gray-500 loading">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- 增长 TOP 5 -->
        <section class="ai-gradient-border p-6 mb-8 bg-white">
            <h2 class="text-2xl font-semibold mb-6 pb-3 border-b-2 border-gray-200 text-gray-800">🏆 增长 TOP 5</h2>
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4 growth-cards" id="growthCards">
                加载中...
            </div>
        </section>

        <!-- 趋势洞察 -->
        <section class="ai-gradient-border p-6 mb-8 bg-white">
            <h2 class="text-2xl font-semibold mb-6 pb-3 border-b-2 border-gray-200 text-gray-800">💡 趋势洞察</h2>
            <div id="insightsContent">加载中...</div>
        </section>

        <!-- 语言分布 -->
        <section class="ai-gradient-border p-6 mb-8 bg-white">
            <h2 class="text-2xl font-semibold mb-6 pb-3 border-b-2 border-gray-200 text-gray-800">📊 语言分布</h2>
            <div class="space-y-3 language-chart" id="languageChart">
                加载中...
            </div>
        </section>

        <!-- 回到顶部按钮 -->
        <button id="backToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="fixed bottom-6 right-6 bg-gradient-to-r from-indigo-600 to-purple-600 text-white w-12 h-12 rounded-full shadow-lg hover:shadow-xl transition-all opacity-0 pointer-events-none hover:scale-110" style="transition: opacity 0.3s;">
            ↑
        </button>
    </main>

    <footer class="bg-white border-t py-8 mt-8">
        <div class="max-w-6xl mx-auto px-4 text-center text-gray-500 text-sm">
            <p class="mb-2">数据来源：<a href="https://github.com/trending" target="_blank" class="text-indigo-600 hover:underline font-medium">github.com/trending</a></p>
            <p>AI 风格设计 · 自动每日更新 · 纯静态 GitHub Pages 托管</p>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        // 回到顶部按钮显示逻辑
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTop');
            if (window.scrollY > 300) {
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            } else {
                btn.style.opacity = '0';
                btn.style.pointerEvents = 'none';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 热门仓库趋势 | Daily Trending</title>
    <link rel="icon" href="https://github.githubassets.com/favicons/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
    <header class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-10 px-4 relative">
        <div class="max-w-6xl mx-auto text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-3">🔥 GitHub 热门仓库趋势</h1>
            <p class="text-lg opacity-90 mb-4">每日更新，追踪开源社区热点</p>
            <p class="text-sm opacity-80">最后更新：<span id="updateDate" class="font-semibold">-</span></p>
        </div>
        <div class="absolute top-6 right-4">
            <a href="https://github.com/bubbleatgit/github-trending-daily" target="_blank"
               class="inline-flex items-center gap-2 bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition-colors">
                <img src="https://github.githubassets.com/favicons/favicon.svg" alt="GitHub" width="20">
                查看源码
            </a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- 类型与日期选择 -->
        <section class="bg-white rounded-xl shadow-sm p-6 mb-6">
            <h3 class="text-lg font-semibold mb-4 text-gray-800">📅 榜单选择</h3>
            <div class="flex flex-wrap gap-3 mb-4">
                <button class="type-btn active px-6 py-2 border-2 rounded-full transition-all hover:border-indigo-600 data-[active=true]:bg-indigo-600 data-[active=true]:text-white data-[active=true]:border-indigo-600 border-gray-200 bg-white" data-type="daily">📆 日榜单</button>
                <button class="type-btn px-6 py-2 border-2 rounded-full transition-all hover:border-indigo-600 data-[active=true]:bg-indigo-600 data-[active=true]:text-white data-[active=true]:border-indigo-600 border-gray-200 bg-white" data-type="weekly">📅 周榜单</button>
            </div>
            <div>
                <select id="dateSelector" class="date-selector border-2 border-gray-200 rounded-lg px-4 py-2 text-base bg-white focus:outline-none focus:border-indigo-600 min-w-[240px]">
                    <option value="">加载中...</option>
                </select>
            </div>
        </section>

        <!-- 统计信息 -->
        <section class="bg-gradient-to-r from-gray-50 to-gray-100 rounded-xl shadow-sm p-6 mb-6">
            <div class="stat-card">
                <h3 class="text-lg font-semibold mb-4 text-gray-800">📊 统计信息</h3>
                <div id="statsSummary" class="grid grid-cols-2 md:grid-cols-4 gap-4">加载中...</div>
            </div>
        </section>

        <!-- 语言筛选 -->
        <section class="bg-white rounded-xl shadow-sm p-6 mb-6">
            <h3 class="text-lg font-semibold mb-4 text-gray-800">🔍 语言筛选</h3>
            <div class="flex flex-wrap gap-2" id="languageFilters">
                <button class="filter-btn active px-4 py-2 border-2 rounded-full transition-all hover:border-indigo-600 data-[active=true]:bg-indigo-600 data-[active=true]:text-white data-[active=true]:border-indigo-600 border-gray-200 bg-white" data-lang="all">全部</button>
            </div>
        </section>

        <!-- 榜单表格 -->
        <section class="bg-white rounded-xl shadow-sm p-6 mb-6">
            <h2 class="text-2xl font-semibold mb-4 pb-2 border-b-2 border-gray-200 text-indigo-600">📈 热门仓库排行榜</h2>
            <div class="overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-gray-50">
                            <th class="px-3 py-4 text-left font-semibold border-b-2 border-gray-200">排名</th>
                            <th class="px-3 py-4 text-left font-semibold border-b-2 border-gray-200">仓库</th>
                            <th class="px-3 py-4 text-left font-semibold border-b-2 border-gray-200">语言</th>
                            <th class="px-3 py-4 text-left font-semibold border-b-2 border-gray-200">Stars</th>
                            <th class="px-3 py-4 text-left font-semibold border-b-2 border-gray-200">Forks</th>
                            <th class="px-3 py-4 text-left font-semibold border-b-2 border-gray-200">新增</th>
                            <th class="px-3 py-4 text-left font-semibold border-b-2 border-gray-200">简介</th>
                        </tr>
                    </thead>
                    <tbody id="trendingBody">
                        <tr><td colspan="7" class="px-3 py-6 text-center text-gray-500 loading">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- 增长 TOP 5 -->
        <section class="bg-white rounded-xl shadow-sm p-6 mb-6">
            <h2 class="text-2xl font-semibold mb-4 pb-2 border-b-2 border-gray-200 text-indigo-600">🏆 增长 TOP 5</h2>
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4 growth-cards" id="growthCards">
                加载中...
            </div>
        </section>

        <!-- 趋势洞察 -->
        <section class="bg-white rounded-xl shadow-sm p-6 mb-6">
            <h2 class="text-2xl font-semibold mb-4 pb-2 border-b-2 border-gray-200 text-indigo-600">💡 趋势洞察</h2>
            <div id="insightsContent">加载中...</div>
        </section>

        <!-- 语言分布 -->
        <section class="bg-white rounded-xl shadow-sm p-6 mb-6">
            <h2 class="text-2xl font-semibold mb-4 pb-2 border-b-2 border-gray-200 text-indigo-600">📊 语言分布</h2>
            <div class="space-y-2 language-chart" id="languageChart">
                加载中...
            </div>
        </section>
    </main>

    <footer class="bg-white border-t py-6 mt-8">
        <div class="max-w-6xl mx-auto px-4 text-center text-gray-500 text-sm">
            <p>数据来源：<a href="https://github.com/trending" target="_blank" class="text-indigo-600 hover:underline">github.com/trending</a></p>
            <p class="mt-2">自动每日更新 · 基于 GitHub Pages</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>

        <div class="header-content">
            <h1>🔥 GitHub 热门仓库趋势</h1>
            <p class="subtitle">每日更新，追踪开源社区热点</p>
            <p class="update-time">最后更新：<span id="updateDate">-</span></p>
        </div>
        <div class="nav">
            <a href="https://github.com/bubbleatgit/github-trending-daily" target="_blank">
                <img src="https://github.githubassets.com/favicons/favicon.svg" alt="GitHub" width="20">

        </div>
    </header>

    <main>
        <section class="filter-section">
            <h3>📅 榜单类型选择</h3>
            <div class="filter-buttons">
                <button class="type-btn active" data-type="daily">📆 日榜单</button>
                <button class="type-btn" data-type="weekly">📅 周榜单</button>
            </div>
            <div style="margin-top: 1rem;">

                    <option value="">加载中...</option>

            <div class="stat-card">
                <h3>📊 统计信息</h3>
                <div id="statsSummary">加载中...</div>
            </div>
        </section>

        <section class="filter-section">
            <h3>🔍 语言筛选</h3>
            <div class="filter-buttons" id="languageFilters">
                <button class="filter-btn active" data-lang="all">全部</button>
            </div>
        </section>

        <section class="trending-section">
            <h2>📈 热门仓库排行榜</h2>
            <div class="table-container">
                <table id="trendingTable">
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>仓库</th>
                            <th>语言</th>
                            <th>Stars</th>
                            <th>Forks</th>
                            <th>新增</th>
                            <th>简介</th>
                        </tr>
                    </thead>
                    <tbody id="trendingBody">
                        <tr><td colspan="7" class="loading">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="top-growth-section">
            <h2>🏆 今日增长 TOP 5</h2>
            <div class="growth-cards" id="growthCards">
                加载中...
            </div>
        </section>

        <section class="insights-section">
            <h2>💡 趋势洞察</h2>
            <div id="insightsContent">加载中...</div>
        </section>

        <section class="language-stats-section">
            <h2>📊 语言分布</h2>
            <div class="language-chart" id="languageChart">
                加载中...
            </div>
